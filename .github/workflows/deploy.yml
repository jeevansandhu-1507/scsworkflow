name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Install .NET SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # Publish the project
      - name: Publish Blazor WebAssembly
        run: dotnet publish SCSPortal.csproj -c Release -o release

      # Add .nojekyll file to prevent GitHub Pages from ignoring files beginning with an underscore
      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      # Change base-tag in index.html to match repository name
      - name: Change base-tag to match repository name
        run: sed -i 's/<base href="\/" \/>/<base href="\/scsworkflow\/" \/>/g' release/wwwroot/index.html

      # Copy index.html to 404.html to support client-side routing on GitHub Pages
      - name: Copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # Deploy the publish directory to gh-pages branch
      - name: Commit and deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: release/wwwroot
